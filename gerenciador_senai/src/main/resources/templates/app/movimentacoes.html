<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movimentações | Sistema de Estoque</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>

    <main class="page">
        <section class="section">
            <div class="container">
                <div class="page-header">
                    <div>
                        <h1>Movimentações</h1>
                        <p>Registre entradas e saídas de materiais no estoque.</p>
                    </div>
                </div>

                <div th:replace="~{fragments/messages :: messages}"></div>

                <div class="content-grid">
                    <section class="panel">
                        <div class="panel-header">
                            <h2 th:text="${movimentacao.id != null ? 'Editar Movimentação' : 'Nova Movimentação'}"></h2>
                            <a th:if="${movimentacao.id != null}" th:href="@{/app/movimentacoes}">Limpar formulário</a>
                        </div>

                        <form th:action="@{/app/movimentacoes/salvar}" method="post" class="form-grid">
                            <input type="hidden" name="id" th:value="${movimentacao.id}" />

                            <div>
                                <label for="materialId">Material</label>
                                <select id="materialId" name="materialId">
                                    <option value="">Selecione</option>
                                    <option th:each="materialItem : ${materiais}" th:value="${materialItem.id}"
                                        th:selected="${movimentacao.material != null and movimentacao.material.id == materialItem.id}"
                                        th:text="${materialItem.nome + ' | Estoque atual: ' + materialItem.quantidadeEmEstoque}"></option>
                                </select>
                            </div>

                            <div class="two-columns">
                                <div>
                                    <label for="tipoMovimentacao">Tipo</label>
                                    <select id="tipoMovimentacao" name="tipoMovimentacao">
                                        <option value="">Selecione</option>
                                        <option th:each="tipo : ${tiposMovimentacao}" th:value="${tipo}"
                                            th:selected="${movimentacao.tipoMovimentacao == tipo}" th:text="${tipo}"></option>
                                    </select>
                                </div>

                                <div>
                                    <label for="quantidade">Quantidade</label>
                                    <input id="quantidade" type="number" min="1" name="quantidade" th:value="${movimentacao.quantidade}" />
                                </div>
                            </div>

                            <div>
                                <label for="observacao">Observação</label>
                                <textarea id="observacao" name="observacao" rows="4" placeholder="Informação extra sobre a movimentação" th:text="${movimentacao.observacao}"></textarea>
                            </div>

                            <button class="button" type="submit">Salvar Movimentação</button>
                        </form>
                    </section>

                    <section class="panel">
                        <div class="panel-header">
                            <h2>Histórico de Movimentações</h2>
                        </div>

                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Data</th>
                                        <th>Material</th>
                                        <th>Tipo</th>
                                        <th>Qtd</th>
                                        <th>Responsável</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="movimentacao : ${movimentacoes}">
                                        <td th:text="${movimentacao.dataMovimentacao}"></td>
                                        <td th:text="${movimentacao.material.nome}"></td>
                                        <td th:text="${movimentacao.tipoMovimentacao}"></td>
                                        <td th:text="${movimentacao.quantidade}"></td>
                                        <td th:text="${movimentacao.responsavel}"></td>
                                        <td class="actions">
                                            <a th:href="@{/app/movimentacoes/editar/{id}(id=${movimentacao.id})}">Editar</a>
                                            <form th:action="@{/app/movimentacoes/{id}/excluir(id=${movimentacao.id})}" method="post">
                                                <button class="button-link danger" type="submit">Excluir</button>
                                            </form>
                                        </td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(movimentacoes)}">
                                        <td colspan="6">Nenhuma movimentação cadastrada.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </div>
            </div>
        </section>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
